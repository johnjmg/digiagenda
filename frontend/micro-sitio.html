<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiAgenda - Reserva tu cita</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        label { font-weight: bold; display: block; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: 1px solid #ccc; }
        button { margin-top: 15px; background: #007bff; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .resenas { margin-top: 30px; }
        .resena { border-top: 1px solid #ddd; padding: 10px 0; }
        .puntuacion { color: gold; }
        .error { color: red; }
        .exito { color: green; }
    </style>
</head>
<body>
<div class="container">
    <h1>DigiAgenda</h1>
    <h2 id="nombre-negocio">Cargando negocio...</h2>

    <h3>Reserva tu cita</h3>
    <form id="reserva-form">
        <label>Servicio:</label>
        <select id="servicio_id" required></select>

        <label>Tu nombre:</label>
        <input type="text" id="cliente_nombre" required>

        <label>Tu email:</label>
        <input type="email" id="cliente_email" required>

        <label>Fecha y hora:</label>
        <input type="datetime-local" id="fecha_hora" required>

        <button type="submit">Reservar</button>
    </form>
    <div id="mensaje"></div>

    <div class="resenas">
        <h3>Reseñas de clientes</h3>
        <div id="lista-resenas">Cargando reseñas...</div>
    </div>

    <hr>
    <h3>✍️ ¿Ya asististe a tu cita? Deja tu valoración</h3>
    <form id="valoracion-form">
        <label>Token que te dio el negocio:</label>
        <input type="text" id="token-valoracion" placeholder="Ej: a1b2c3d4e5f6..." required>
        <label>Puntuación (1 a 5 estrellas):</label>
        <select id="puntuacion" required>
            <option value="">-- Selecciona --</option>
            <option value="1">⭐ - Muy malo</option>
            <option value="2">⭐⭐ - Malo</option>
            <option value="3">⭐⭐⭐ - Regular</option>
            <option value="4">⭐⭐⭐⭐ - Bueno</option>
            <option value="5">⭐⭐⭐⭐⭐ - Excelente</option>
        </select>
        <label>Comentario (opcional):</label>
        <textarea id="comentario" rows="3"></textarea>
        <button type="submit">Enviar valoración</button>
    </form>
    <div id="valoracion-mensaje"></div>
</div>

<script>
    // Obtener el ID del negocio desde la URL (?id=xxx)
    const urlParams = new URLSearchParams(window.location.search);
    const NEGOCIO_ID = urlParams.get('id');
    if (!NEGOCIO_ID) {
        document.getElementById("nombre-negocio").innerHTML = "❌ No se especificó un negocio. Use ?id=NUMBER en la URL.";
        document.getElementById("reserva-form").style.display = "none";
        throw new Error("Falta id del negocio");
    }

    const API_BASE_URL = "http://localhost:8000/api";

    async function cargarNegocio() {
        try {
            const response = await fetch(`${API_BASE_URL}/negocios/${NEGOCIO_ID}/`);
            if (!response.ok) throw new Error("No encontrado");
            const negocio = await response.json();
            document.getElementById("nombre-negocio").textContent = negocio.nombre;
        } catch (error) {
            document.getElementById("nombre-negocio").textContent = "Negocio no encontrado";
        }
    }

    async function cargarServicios() {
        try {
            const response = await fetch(`${API_BASE_URL}/negocios/${NEGOCIO_ID}/servicios/`);
            if (!response.ok) throw new Error("Error al cargar servicios");
            const servicios = await response.json();
            const select = document.getElementById("servicio_id");
            select.innerHTML = "";
            servicios.forEach(s => {
                const option = document.createElement("option");
                option.value = s.id;
                option.textContent = `${s.nombre} - ${s.duracion_minutos} min - $${s.precio}`;
                select.appendChild(option);
            });
        } catch (error) {
            console.error(error);
        }
    }

    async function cargarResenas() {
        try {
            const response = await fetch(`${API_BASE_URL}/negocios/${NEGOCIO_ID}/valoraciones/`);
            if (!response.ok) throw new Error("Error al cargar reseñas");
            const valoraciones = await response.json();
            const contenedor = document.getElementById("lista-resenas");
            if (valoraciones.length === 0) {
                contenedor.innerHTML = "<p>Aún no hay reseñas. ¡Sé el primero en opinar!</p>";
                return;
            }
            contenedor.innerHTML = "";
            valoraciones.forEach(v => {
                const div = document.createElement("div");
                div.className = "resena";
                div.innerHTML = `
                    <div class="puntuacion">${"★".repeat(v.puntuacion)}${"☆".repeat(5 - v.puntuacion)}</div>
                    <p>${v.comentario || "Sin comentario"}</p>
                    <small>${new Date(v.fecha).toLocaleDateString()}</small>
                `;
                contenedor.appendChild(div);
            });
        } catch (error) {
            console.error(error);
        }
    }

    document.getElementById("reserva-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const servicio_id = document.getElementById("servicio_id").value;
        const cliente_nombre = document.getElementById("cliente_nombre").value;
        const cliente_email = document.getElementById("cliente_email").value;
        const fecha_hora = document.getElementById("fecha_hora").value;

        if (!fecha_hora) {
            document.getElementById("mensaje").innerHTML = "<div class='error'>❌ Debes seleccionar fecha y hora.</div>";
            return;
        }

        const body = {
            servicio_id: parseInt(servicio_id),
            cliente_nombre,
            cliente_email,
            fecha_hora
        };

        try {
            const response = await fetch(`${API_BASE_URL}/negocios/${NEGOCIO_ID}/reservas/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body)
            });
            if (response.ok) {
                document.getElementById("mensaje").innerHTML = "<div class='exito'>✅ Reserva creada. Espera confirmación del negocio.</div>";
                document.getElementById("reserva-form").reset();
            } else {
                const error = await response.json();
                document.getElementById("mensaje").innerHTML = `<div class='error'>❌ Error: ${error.detail || "No se pudo crear la reserva"}</div>`;
            }
        } catch (err) {
            document.getElementById("mensaje").innerHTML = "<div class='error'>❌ Error de conexión</div>";
        }
    });

    cargarNegocio();
    cargarServicios();
    cargarResenas();

        // Envío de valoración con token
    document.getElementById("valoracion-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const token = document.getElementById("token-valoracion").value.trim();
        const puntuacion = parseInt(document.getElementById("puntuacion").value);
        const comentario = document.getElementById("comentario").value;

        if (!token || !puntuacion) {
            document.getElementById("valoracion-mensaje").innerHTML = "<div class='error'>❌ Token y puntuación son obligatorios.</div>";
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/valoraciones/`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, puntuacion, comentario })
            });
            if (response.ok) {
                document.getElementById("valoracion-mensaje").innerHTML = "<div class='exito'>✅ ¡Gracias por tu valoración! La reseña se publicará en breve.</div>";
                document.getElementById("valoracion-form").reset();
                // Recargar reseñas para que aparezca la nueva
                cargarResenas();
            } else {
                const error = await response.json();
                document.getElementById("valoracion-mensaje").innerHTML = `<div class='error'>❌ Error: ${error.detail || "Token inválido o reserva no completada"}</div>`;
            }
        } catch (err) {
            document.getElementById("valoracion-mensaje").innerHTML = "<div class='error'>❌ Error de conexión</div>";
        }
    });
</script>
</body>
</html>
